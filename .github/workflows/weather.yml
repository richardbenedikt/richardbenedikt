name: Update weather

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch weather
        run: |
          weather=$(curl -fsS --get "https://wttr.in/Cologne" --data-urlencode "format=%c %t" | tr -d '\n')
          {
            echo "WEATHER<<EOF"
            echo "$weather"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Update README
        run: |
          python3 <<'PY'
          import os, re, sys
          weather = os.environ.get("WEATHER", "").strip()
          if not weather:
              sys.exit(0)
          with open("README.md", encoding="utf-8") as f:
              content = f.read()
          new = re.sub(
              r"<!--WEATHER-->.*?<!--/WEATHER-->",
              f"<!--WEATHER--> · {weather}<!--/WEATHER-->",
              content,
              flags=re.DOTALL,
          )
          if new != content:
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new)
          PY

      - name: Commit and push
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update Cologne weather"
            git push
          fi
